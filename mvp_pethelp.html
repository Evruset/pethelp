<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>VetHelp — сайт и кабинеты · v7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#17332d',
            canvas: '#f5f8f7',
            line: '#d9e5e0',
            primary: '#0f766e',
            primarydark: '#115e59',
            mint: '#e8f7f1',
            muted: '#66756f',
            danger: '#b7433d',
            warning: '#a96812'
          },
          boxShadow: {
            card: '0 8px 22px rgba(21,55,46,.07)',
            soft: '0 18px 45px rgba(14,63,52,.11)'
          }
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: light; }
    html, body { min-height: 100%; background: #f5f8f7; }
    body { min-width: 320px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    .safe-top { padding-top: max(12px, env(safe-area-inset-top)); }
    .safe-bottom { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .touch { min-height: 44px; min-width: 44px; }
    .tap { transition: transform .16s ease, box-shadow .16s ease, background-color .16s ease, border-color .16s ease; }
    .tap:active { transform: scale(.985); }
    .offline-dim { filter: grayscale(.7); opacity: .5; pointer-events: none; user-select: none; }
    .slide-in { animation: slide-in .24s ease both; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .network-toggle { position: relative; width: 46px; height: 27px; border-radius: 999px; transition: background .2s ease; }
    .network-toggle::after { content:''; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.18); transition: transform .2s ease; }
    .network-toggle.is-on::after { transform: translateX(19px); }
    .vet-map { height: min(48vh, 430px); min-height: 330px; width: 100%; border-radius: 24px; overflow: hidden; background: #e8f7f1; }
    .leaflet-container { font-family: inherit; }
    .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 12px 30px rgba(21,55,46,.16); }
    .leaflet-popup-content { margin: 12px 14px; }
    .map-pin-label { font-weight: 800; color: #17332d; }
    .map-pin-address { margin-top: 2px; color: #66756f; font-size: 12px; }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior:auto !important; } }
  </style>
</head>
<body class="bg-canvas text-ink">
  <main class="min-h-[100dvh] bg-canvas">
    <header class="safe-top sticky top-0 z-40 border-b border-line/80 bg-white/90 px-4 pb-3 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3">
        <button data-action="home" class="tap flex min-w-0 items-center gap-2 text-left" aria-label="На главный экран">
          <span class="grid h-10 w-10 shrink-0 place-items-center rounded-2xl bg-primary text-lg font-black text-white shadow-card">✚</span>
          <span class="min-w-0">
            <span class="block text-[18px] font-extrabold tracking-tight">Vet<span class="text-primary">Help</span></span>
            <span id="roleCaption" class="block truncate text-[11px] font-medium text-slate-500">Новый пользователь</span>
          </span>
        </button>
        <button id="connectionButton" class="tap touch inline-flex items-center gap-2 rounded-2xl border border-line bg-white px-2.5 py-2 text-xs font-bold shadow-sm" aria-label="Переключить соединение">
          <span id="connectionDot" class="h-2 w-2 rounded-full bg-emerald-500"></span>
          <span id="connectionText">Онлайн</span>
          <span id="connectionToggle" class="network-toggle is-on bg-primary" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <section class="sticky top-[67px] z-30 border-b border-line/70 bg-canvas/95 px-4 py-3 backdrop-blur">
      <div class="mx-auto flex max-w-6xl gap-2 overflow-x-auto no-scrollbar" role="tablist" aria-label="Режим просмотра">
        <button class="role-tab tap shrink-0 rounded-full bg-primary px-3.5 py-2 text-xs font-bold text-white" data-role="guest" role="tab" aria-selected="true">Новый пользователь</button>
        <button class="role-tab tap shrink-0 rounded-full border border-line bg-white px-3.5 py-2 text-xs font-bold text-slate-600" data-role="owner" role="tab" aria-selected="false">Зарегистрированный пользователь</button>
        <button class="role-tab tap shrink-0 rounded-full border border-line bg-white px-3.5 py-2 text-xs font-bold text-slate-600" data-role="clinic" role="tab" aria-selected="false">Клиника</button>
      </div>
    </section>

    <div id="content" class="mx-auto max-w-6xl pb-28 md:pb-10"></div>
    <nav id="bottomNav" class="safe-bottom fixed inset-x-0 bottom-0 z-40 border-t border-line bg-white/95 px-2 pt-2 backdrop-blur md:hidden" aria-label="Нижняя навигация"></nav>

    <div id="offlineOverlay" class="hidden fixed inset-0 z-50 items-end bg-slate-950/40 px-4 pb-[calc(1rem+env(safe-area-inset-bottom))] backdrop-blur-[2px] sm:items-center sm:justify-center" role="alertdialog" aria-modal="true" aria-labelledby="offlineTitle">
      <section class="slide-in w-full max-w-md rounded-[28px] bg-white p-5 shadow-soft">
        <div class="flex items-start gap-3"><span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-amber-100 text-xl">⌁</span><div><p class="text-xs font-bold uppercase tracking-[.15em] text-warning">Офлайн</p><h2 id="offlineTitle" class="mt-1 text-xl font-extrabold">Нет соединения</h2><p class="mt-2 text-sm leading-6 text-muted">Новые записи, сообщения и подтверждения временно недоступны. Уже загруженные данные остаются на экране.</p></div></div>
        <div class="mt-4 rounded-2xl bg-slate-100 px-3 py-3 text-sm leading-5 text-slate-600"><b class="text-ink">Доступно:</b> просмотр информации и сохранённых записей. Изменения отправятся после восстановления сети.</div>
        <button id="restoreButton" class="tap touch mt-4 w-full rounded-2xl bg-primary px-4 py-3 text-sm font-extrabold text-white shadow-card">Восстановить соединение</button>
      </section>
    </div>
    <div id="toast" class="pointer-events-none fixed left-1/2 top-24 z-[60] hidden w-[min(92vw,480px)] -translate-x-1/2 rounded-2xl bg-ink px-4 py-3 text-sm font-bold text-white shadow-soft" role="status" aria-live="polite"></div>
  </main>

<script>
  const state = {
    role: 'guest',
    page: 'home',
    online: true,
    selectedClinic: 0,
    mapClinic: 0,
    selectedSlot: 'Сегодня, 18:30',
    channel: 'MAX',
    consultation: { price: 790, status: 'idle', eta: '8–12 минут' },
    insurance: { status: 'none', plan: null },
    clinicSlots: { '14:30':'occupied', '16:00':'pending', '18:30':'open', '20:00':'open' },
    alternativeFor: null,
    booking: {
      id: 'VH-4107',
      pet: 'Барсик',
      kind: 'кот, 4 года',
      source: 'VK',
      receivedAt: '3 мин назад',
      description: 'Вялость, плохо ест с утра. Красные флаги не отмечены.',
      requestedTime: '16:00',
      proposedTime: null,
      confirmedTime: null,
      status: 'pending'
    }
  };

  const clinics = [
    {
      name:'Пульс', initials:'П',
      address:'Раменское, Северное шоссе, 50',
      meta:'Северное шоссе, 50 · 1,5 км',
      type:'Круглосуточная ветеринарная клиника',
      hours:'Круглосуточно',
      lat:55.581317, lng:38.218321,
      slots:['Сегодня, 18:30','Сегодня, 19:20','Завтра, 10:00'],
      demoAvailability:'Демо: есть запись сегодня'
    },
    {
      name:'Четыре Лапы', initials:'4Л',
      address:'Раменское, Дергаевская улица, 34',
      meta:'Дергаевская улица, 34 · 2,4 км',
      type:'Ветеринарная клиника',
      hours:'Круглосуточно',
      lat:55.580849, lng:38.243644,
      slots:['Сегодня, 20:00','Завтра, 09:30','Завтра, 12:00'],
      demoAvailability:'Демо: 2 окна на сегодня'
    },
    {
      name:'Ветмастер', initials:'ВМ',
      address:'Раменское, Донинское шоссе, 4/2',
      meta:'Донинское шоссе, 4/2 · 2,7 км',
      type:'Ветеринарный центр',
      hours:'Круглосуточно',
      lat:55.577241, lng:38.241327,
      slots:['Сегодня, 21:00','Завтра, 10:30','Завтра, 13:00'],
      demoAvailability:'Демо: есть запись сегодня'
    }
  ];

  let vetMapInstance = null;
  let vetMapMarkers = [];

  function routeUrl(clinic){
    return `https://yandex.ru/maps/?rtext=~${clinic.lat},${clinic.lng}&rtt=auto`;
  }

  function mapDetailsCard(){
    const c=clinics[state.mapClinic];
    return `<article class="rounded-[22px] border border-line bg-white p-4 shadow-card"><div class="flex items-start gap-3"><span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-mint text-xs font-black text-primary">${c.initials}</span><div class="min-w-0 flex-1"><div class="flex items-center justify-between gap-2"><h2 class="truncate text-base font-extrabold">${c.name}</h2><span class="rounded-full bg-mint px-2 py-1 text-[10px] font-extrabold text-primarydark">${c.hours}</span></div><p class="mt-1 text-sm text-slate-600">${c.address}</p><p class="mt-2 text-xs leading-5 text-slate-500">${c.demoAvailability}. Доступность и запись в прототипе не отражают фактическую интеграцию.</p></div></div><div class="mt-4 grid grid-cols-2 gap-2"><a href="${routeUrl(c)}" target="_blank" rel="noopener" class="tap touch inline-flex items-center justify-center gap-2 rounded-2xl border border-line bg-white px-3 py-3 text-sm font-extrabold text-ink">${icon('map','h-5 w-5')} Маршрут</a>${button('Выбрать время',`guest:clinic:${state.mapClinic}`,'primary','w-full')}</div></article>`;
  }

  function renderMapDetails(){
    const root=document.getElementById('mapDetails');
    if(root) root.innerHTML=mapDetailsCard();
    if(vetMapInstance){
      const c=clinics[state.mapClinic];
      vetMapInstance.flyTo([c.lat,c.lng],15,{duration:.45});
    }
  }

  function initVetMap(){
    const mapEl=document.getElementById('vetMap');
    if(!mapEl) return;
    if(!window.L){
      mapEl.innerHTML='<div class="grid h-full place-items-center p-6 text-center text-sm leading-6 text-slate-600">Не удалось загрузить интерактивную карту. Проверьте подключение к интернету.</div>';
      return;
    }
    if(vetMapInstance){ vetMapInstance.remove(); vetMapInstance=null; vetMapMarkers=[]; }
    vetMapInstance=L.map(mapEl,{zoomControl:true,attributionControl:true}).setView([55.5792,38.2332],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      maxZoom:19,
      attribution:'&copy; OpenStreetMap contributors'
    }).addTo(vetMapInstance);

    clinics.forEach((clinic,index)=>{
      const marker=L.marker([clinic.lat,clinic.lng]).addTo(vetMapInstance);
      marker.bindPopup(`<div class="map-pin-label">${clinic.name}</div><div class="map-pin-address">${clinic.address}</div>`);
      marker.on('click',()=>{ state.mapClinic=index; renderMapDetails(); });
      vetMapMarkers.push(marker);
    });
    const group=L.featureGroup(vetMapMarkers);
    vetMapInstance.fitBounds(group.getBounds().pad(.22));
    setTimeout(()=>vetMapInstance.invalidateSize(),50);
  }

  function bookingTime(){
    if(state.booking.status==='confirmed') return state.booking.confirmedTime;
    if(state.booking.status==='alternative') return state.booking.proposedTime;
    return state.booking.requestedTime;
  }

  function bookingStatus(){
    const b=state.booking;
    if(b.status==='confirmed') return {label:'Подтверждено клиникой', tone:'bg-mint text-primarydark', note:'Приём сегодня в '+b.confirmedTime};
    if(b.status==='alternative') return {label:'Клиника предложила другое время', tone:'bg-amber-50 text-amber-800', note:'Нужно ответить на предложение: '+b.proposedTime};
    return {label:'Клиника подтверждает время', tone:'bg-amber-50 text-amber-800', note:'Ожидаем ответ в течение 12 минут'};
  }

  function slotState(time){
    const value=state.clinicSlots[time];
    const meta={
      occupied:{label:'Занято', sub:'Визит подтверждён', cls:'border-slate-200 bg-slate-100 text-slate-600'},
      pending:{label:'Новый запрос', sub:'Барсик ждёт решения', cls:'border-amber-200 bg-amber-50 text-amber-800'},
      held:{label:'Время предложено', sub:'Ждём ответ владельца', cls:'border-violet-200 bg-violet-50 text-violet-800'},
      open:{label:'Свободно', sub:'Видно новым пользователям', cls:'border-primary bg-mint text-primarydark'},
      closed:{label:'Скрыто', sub:'Не показывается пользователям', cls:'border-line bg-white text-slate-600'}
    };
    return meta[value] || meta.closed;
  }

  function activeOpenSlots(){ return Object.entries(state.clinicSlots).filter(([,value])=>value==='open').map(([time])=>time); }

  function bookingRequestCard(){
    const b=state.booking;
    const status=bookingStatus();
    const isPending=b.status==='pending';
    const isAlternative=b.status==='alternative';
    const isConfirmed=b.status==='confirmed';
    const alternativeSlots=activeOpenSlots().filter(time=>time!==b.requestedTime);
    const proposedPanel=state.alternativeFor==='Барсик' && isPending ? `<div class="mt-3 rounded-2xl bg-slate-50 p-3"><p class="text-xs font-extrabold text-slate-700">Выберите время, которое предложите владельцу</p><p class="mt-1 text-[11px] leading-4 text-slate-500">После отправки исходное время освободится, а выбранное будет удержано до решения владельца.</p><div class="mt-3 flex flex-wrap gap-2">${alternativeSlots.map(time=>`<button data-action="clinic:propose:Барсик|${time}" class="tap rounded-xl border border-line bg-white px-3 py-2 text-xs font-extrabold text-ink">${time}</button>`).join('') || '<span class="text-xs text-slate-500">Нет свободных окон на сегодня.</span>'}</div></div>` : '';
    const actionBlock=isConfirmed ? `<div class="mt-3 rounded-2xl bg-mint px-3 py-3 text-xs font-bold text-primarydark">✓ Запись подтверждена на ${b.confirmedTime}. Она уже находится в расписании.</div>` : isAlternative ? `<div class="mt-3 rounded-2xl bg-violet-50 px-3 py-3 text-xs leading-5 text-violet-900"><b>Предложено ${b.proposedTime}.</b> Владелец получил уведомление в ${state.channel}; удерживаем окно до его ответа.</div>` : `<div class="mt-3 flex flex-wrap items-center justify-between gap-3"><span class="text-xs font-extrabold text-danger">Ответьте в течение 12 минут</span><div class="flex gap-2"><button data-action="clinic:alternative:Барсик" class="tap rounded-xl border border-line bg-white px-2.5 py-2 text-[11px] font-extrabold">Предложить другое</button><button data-action="clinic:accept:Барсик|${b.requestedTime}" class="tap rounded-xl bg-ink px-2.5 py-2 text-[11px] font-extrabold text-white">Подтвердить ${b.requestedTime}</button></div></div>`;
    return `<article class="request-card rounded-[22px] border ${isPending?'border-rose-200':'border-line'} bg-white p-4 shadow-card"><div class="flex items-start justify-between gap-3"><div class="flex min-w-0 items-center gap-3"><span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl ${isPending?'bg-rose-50':'bg-mint'} text-lg">🐈</span><div class="min-w-0"><h3 class="truncate text-sm font-extrabold">${b.pet} · ${b.kind}</h3><p class="mt-0.5 text-xs text-slate-500">${b.source} · ${b.receivedAt}</p></div></div><span class="shrink-0 rounded-full ${status.tone} px-2 py-1 text-[11px] font-bold">${status.label}</span></div><p class="mt-3 text-sm leading-5 text-slate-700">${b.description}</p>${actionBlock}${proposedPanel}</article>`;
  }


  const icon = (name, cls='h-5 w-5') => {
    const set = {
      home:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>`,
      calendar:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>`,
      paw:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 14c-3.3-4.2-6.8-3.3-7.7-.8-.8 2.2 1.4 4.1 3.6 4.3 1.8.1 2.9-.6 4.1-1.9 1.2 1.3 2.3 2 4.1 1.9 2.2-.2 4.4-2.1 3.6-4.3-.9-2.5-4.4-3.4-7.7.8Z"/><circle cx="6.5" cy="8" r="1.5"/><circle cx="10" cy="5.5" r="1.5"/><circle cx="14" cy="5.5" r="1.5"/><circle cx="17.5" cy="8" r="1.5"/></svg>`,
      chat:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 0 1-8 8H6l-3 2 1-4.3A8 8 0 1 1 21 12Z"/><path d="M8 12h.01M12 12h.01M16 12h.01"/></svg>`,
      chevron:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>`,
      clock:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M12 7v5l3 2"/></svg>`,
      phone:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8 10a16 16 0 0 0 6 6l1.4-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9Z"/></svg>`,
      check:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg>`,
      video:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="12" height="12" rx="2"/><path d="m15 10 5-3v10l-5-3"/></svg>`,
      map:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3-6-3Z"/><path d="M9 3v15M15 6v15"/></svg>`,
      inbox:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18v16H3z"/><path d="M3 14h5l2 3h4l2-3h5"/></svg>`,
      signal:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20v-5M9 20v-9M14 20V7M19 20V3"/></svg>`,
      plus:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`,
      bell:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/></svg>`,
      shield:`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 5 6v5c0 5 3.2 8.8 7 10.8 3.8-2 7-5.8 7-10.8V6l-7-3Z"/><path d="m9 12 2 2 4-4"/></svg>`
    };
    return set[name] || '';
  };

  const card = (html, extra='') => `<article class="rounded-[24px] border border-line bg-white p-4 shadow-card ${extra}">${html}</article>`;
  const button = (label, action, tone='primary', extra='') => {
    const tones = {
      primary:'bg-primary text-white shadow-card hover:bg-primarydark',
      secondary:'border border-line bg-white text-ink hover:bg-slate-50',
      danger:'bg-danger text-white hover:bg-rose-700',
      soft:'bg-mint text-primarydark hover:bg-emerald-100'
    };
    return `<button data-action="${action}" class="tap touch inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-3 text-sm font-extrabold focus:outline-none focus:ring-4 focus:ring-primary/20 ${tones[tone]} ${extra}">${label}</button>`;
  };
  const title = (eyebrow, heading, text='') => `<section class="px-4 pt-5"><p class="text-[11px] font-extrabold uppercase tracking-[.16em] text-primary">${eyebrow}</p><h1 class="mt-1 text-[28px] font-extrabold leading-[1.08] tracking-[-.04em]">${heading}</h1>${text?`<p class="mt-2 text-sm leading-6 text-slate-500">${text}</p>`:''}</section>`;

  function renderGuestHome(){
    return `<div class="mx-auto max-w-[560px] slide-in">${title('VetHelp','Помощь питомцу — без лишних звонков','Начните без регистрации. Выберите подходящий путь: срочно, онлайн-консультация, клиника или страховка.')}
      <section class="space-y-3 px-4 pt-5">

  function setRole(role){
    state.role=role; state.page='home';
    document.querySelectorAll('.role-tab').forEach(tab=>{
      const on=tab.dataset.role===role;
      tab.className='role-tab tap shrink-0 rounded-full px-3.5 py-2 text-xs font-bold '+(on?'bg-primary text-white':'border border-line bg-white text-slate-600');
      tab.setAttribute('aria-selected',String(on));
    });
    renderContent();

  function showToast(message){
    const el=document.getElementById('toast');el.textContent=message;el.classList.remove('hidden');clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.add('hidden'),2800);
  }
  function handleAction(action){
    if(!state.online) return;
    if(action==='home'){state.page='home';renderContent();return;}
    if(action.startsWith('toast:')){showToast(action.slice(6));return;}
    // Аргумент действия может содержать ':' (например, время "Сегодня, 18:30").
    // Собираем остаток обратно, чтобы не терять минуты и корректно подсветить выбранный слот.
    const [scope, cmd, ...parts] = action.split(':');
    const arg = parts.join(':');
    if(scope==='guest'){
      if(cmd==='insuranceLead'){showToast('Заявка на полис сохранена. В рабочем сервисе её примет страховой партнёр.');return;}
      if(cmd==='clinic'){state.selectedClinic=Number(arg);state.page='clinic';}
      else if(cmd==='slot'){state.selectedSlot=arg;showToast('Выбрано время: '+arg);renderContent();return;}
      else if(cmd==='channel'){state.channel=arg;renderContent();return;}
      else if(['home','check','check2','emergency','results','map','service','consult','consultCheckout','consultConfirmed','insurance','insuranceQuote','insuranceQuoteResult','insuranceCheck','insuranceCheckResult','booking','confirmed'].includes(cmd)){ if(cmd==='consultConfirmed') state.consultation.status='requested'; if(cmd==='insuranceLead') showToast('Заявка на полис сохранена. В рабочем сервисе её примет страховой партнёр.'); state.page=cmd;}
      renderContent();return;
    }
    if(scope==='owner'){
      if(cmd==='book'){setRole('guest');state.page='results';renderContent();return;}
      if(cmd==='acceptAlternative'){
        const b=state.booking;
        if(b.status==='alternative'){
          b.status='confirmed';b.confirmedTime=b.proposedTime;
          state.clinicSlots[b.proposedTime]='occupied';
          showToast('Новое время '+b.confirmedTime+' подтверждено. Клиника получила ответ.');
        }
        state.page='appointment';renderContent();return;
      }
      if(cmd==='consultConfirmed'){state.consultation.status='requested'; showToast('Консультация создана. Ветеринар подключится в чате.'); state.page='consult'; renderContent(); return;}
      if(cmd==='insuranceLead'){showToast('Заявка на полис сохранена.');return;}
      if(['home','appointment','pet','consult','insurance','insuranceQuote','insuranceCheck','insuranceCheckResult'].includes(cmd))state.page=cmd;
      renderContent();return;
    }
    if(scope==='clinic'){
      if(cmd==='accept'){
        const [pet,time]=(arg||'').split('|');
        if(pet==='Барсик'){
          const b=state.booking;
          b.status='confirmed';b.confirmedTime=time;b.proposedTime=null;
          Object.keys(state.clinicSlots).forEach(slot=>{if(state.clinicSlots[slot]==='pending'||state.clinicSlots[slot]==='held') state.clinicSlots[slot]='open';});
          state.clinicSlots[time]='occupied';
          showToast('Время '+time+' подтверждено. Владельцу отправлено уведомление в '+state.channel+'.');
          state.alternativeFor=null;renderContent();return;
        }
        showToast('Запись подтверждена на '+time+'.');return;
      }
      if(cmd==='alternative'){state.alternativeFor=state.alternativeFor===arg?null:arg;renderContent();return;}
      if(cmd==='propose'){
        const [pet,time]=(arg||'').split('|');
        if(pet==='Барсик'){
          const b=state.booking;
          state.clinicSlots[b.requestedTime]='open';
          b.status='alternative';b.proposedTime=time;
          state.clinicSlots[time]='held';
          state.alternativeFor=null;
          showToast('Владельцу предложено время '+time+'. Окно удержано до ответа.');
          renderContent();return;
        }
      }
      if(cmd==='availability'){
        const current=state.clinicSlots[arg];
        if(current==='open'||current==='closed'){
          state.clinicSlots[arg]=current==='open'?'closed':'open';
          showToast('Окно '+arg+' '+(state.clinicSlots[arg]==='open'?'открыто для новых записей':'скрыто от новых обращений')+'.');
          renderContent();
        }
        return;
      }
      if(cmd==='tomorrow'){showToast('Добавлено окно на завтра: 09:30');return;}
      if(['home','requests','schedule','analytics'].includes(cmd))state.page=cmd;
      renderContent();return;
    }
  }

  document.addEventListener('click',event=>{
    const role=event.target.closest('.role-tab');
    if(role){setRole(role.dataset.role);return;}
    const action=event.target.closest('[data-action]');
    if(action){handleAction(action.dataset.action);}
  });
  document.getElementById('connectionButton').addEventListener('click',()=>{state.online=!state.online;updateHeader();applyConnection();if(state.online)showToast('Соединение восстановлено. Данные синхронизированы.');});
  document.getElementById('restoreButton').addEventListener('click',()=>{state.online=true;updateHeader();applyConnection();showToast('Соединение восстановлено. Данные синхронизированы.');});
  renderContent();
</script>
</body>
</html>
