<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>VetHelp — демонстрация</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{primary:'#0f766e',ink:'#17332d',canvas:'#f5f8f7',line:'#d9e5e0',mint:'#e8f7f1'},boxShadow:{card:'0 8px 22px rgba(21,55,46,.08)'}}}}
  </script>
  <style>
    body{min-height:100dvh;-webkit-font-smoothing:antialiased}.safe-bottom{padding-bottom:max(12px,env(safe-area-inset-bottom))}.top-safe{padding-top:max(12px,env(safe-area-inset-top))}.offline{filter:grayscale(1);opacity:.48;pointer-events:none}.tap{transition:transform .16s ease}.tap:active{transform:scale(.98)}#map{height:300px;border-radius:24px;overflow:hidden}.leaflet-control-attribution{font-size:8px!important}
  </style>
</head>
<body class="bg-canvas text-ink">
<div class="mx-auto min-h-[100dvh] max-w-[600px] bg-canvas">
  <header class="top-safe sticky top-0 z-30 border-b border-line bg-white/95 px-4 pb-3 backdrop-blur">
    <div class="flex items-center justify-between gap-3">
      <button onclick="go('guest','home')" class="tap flex items-center gap-2 text-left"><span class="grid h-10 w-10 place-items-center rounded-2xl bg-primary text-xl font-black text-white">✚</span><span><b class="block text-lg">Vet<span class="text-primary">Help</span></b><small id="caption" class="text-slate-500">Помощь питомцу</small></span></button>
      <button onclick="toggleOnline()" class="tap flex items-center gap-2 rounded-2xl border border-line bg-white px-3 py-2 text-xs font-bold"><span id="dot" class="h-2 w-2 rounded-full bg-emerald-500"></span><span id="onlineText">Онлайн</span><span id="knob" class="relative h-5 w-9 rounded-full bg-primary"><i class="absolute right-0.5 top-0.5 h-4 w-4 rounded-full bg-white"></i></span></button>
    </div>
    <div class="mt-3 flex gap-2 overflow-x-auto pb-1">
      <button data-role="guest" onclick="go('guest','home')" class="role tap rounded-full bg-primary px-3 py-2 text-xs font-bold text-white">Новый пользователь</button>
      <button data-role="owner" onclick="go('owner','home')" class="role tap rounded-full border border-line bg-white px-3 py-2 text-xs font-bold">Мой питомец</button>
      <button data-role="clinic" onclick="go('clinic','home')" class="role tap rounded-full border border-line bg-white px-3 py-2 text-xs font-bold">Клиника</button>
    </div>
  </header>
  <main id="content" class="pb-24"></main>
  <nav id="nav" class="safe-bottom fixed bottom-0 left-1/2 z-30 flex w-full max-w-[600px] -translate-x-1/2 justify-around border-t border-line bg-white/95 px-3 pt-2 backdrop-blur"></nav>
  <div id="offlineModal" class="hidden fixed inset-0 z-50 bg-slate-950/40 p-5 pt-[30vh] backdrop-blur-sm"><div class="rounded-[28px] bg-white p-5 shadow-card"><b class="text-lg">Нет соединения</b><p class="mt-2 text-sm leading-6 text-slate-600">Можно посмотреть уже загруженные данные, но новые записи, оплату и сообщения отправить нельзя.</p><button onclick="toggleOnline()" class="mt-4 w-full rounded-2xl bg-primary px-4 py-3 text-sm font-bold text-white">Восстановить соединение</button></div></div>
  <div id="toast" class="fixed left-1/2 top-24 z-[70] hidden -translate-x-1/2 rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white shadow-card"></div>
</div>
<script>
const S={role:'guest',page:'home',online:true,slot:'Сегодня, 18:30',clinic:'Пульс',request:'Новая'};
const clinics=[{name:'Пульс',addr:'Раменское, Северное шоссе, 50',lat:55.5715,lng:38.2276,rate:'4,8',slots:['Сегодня, 18:30','Сегодня, 19:20','Завтра, 10:00']},{name:'Четыре Лапы',addr:'Раменское, Дергаевская улица, 34',lat:55.5803,lng:38.2406,rate:'4,7',slots:['Сегодня, 20:00','Завтра, 09:30','Завтра, 12:00']},{name:'Ветмастер',addr:'Раменское, Донинское шоссе, 4/2',lat:55.5534,lng:38.2170,rate:'4,6',slots:['Сейчас','Через 30 минут','Сегодня, 21:30']}];
function toast(t){let x=document.getElementById('toast');x.textContent=t;x.classList.remove('hidden');clearTimeout(window.tt);window.tt=setTimeout(()=>x.classList.add('hidden'),2400)}
function go(role,page){if(!S.online)return;S.role=role;S.page=page;render()}
function toggleOnline(){S.online=!S.online;document.getElementById('onlineText').textContent=S.online?'Онлайн':'Офлайн';document.getElementById('dot').className='h-2 w-2 rounded-full '+(S.online?'bg-emerald-500':'bg-amber-500');document.getElementById('knob').className='relative h-5 w-9 rounded-full '+(S.online?'bg-primary':'bg-slate-300');document.querySelector('main').classList.toggle('offline',!S.online);document.querySelector('nav').classList.toggle('offline',!S.online);document.getElementById('offlineModal').classList.toggle('hidden',S.online);if(S.online)toast('Соединение восстановлено')}
function title(k,h,p=''){return `<section class="px-4 pt-5"><p class="text-[11px] font-extrabold uppercase tracking-[.15em] text-primary">${k}</p><h1 class="mt-1 text-[28px] font-extrabold leading-tight tracking-tight">${h}</h1>${p?`<p class="mt-2 text-sm leading-6 text-slate-500">${p}</p>`:''}</section>`}
function card(x,c=''){return `<article class="rounded-[24px] border border-line bg-white p-4 shadow-card ${c}">${x}</article>`}
function btn(t,a,kind='primary'){let c=kind==='primary'?'bg-primary text-white':kind==='danger'?'bg-rose-600 text-white':'border border-line bg-white text-ink';return `<button onclick="${a}" class="tap inline-flex items-center justify-center rounded-2xl px-4 py-3 text-sm font-bold ${c}">${t}</button>`}
function guestHome(){return `${title('Помощь рядом','Что случилось с питомцем?','Начните без регистрации. Поможем выбрать безопасный следующий шаг.')}
<section class="space-y-3 px-4 pt-5"><button onclick="go('guest','emergency')" class="tap w-full rounded-[24px] border border-rose-200 bg-rose-50 p-4 text-left"><b>⚠ Нужна срочная помощь</b><span class="mt-1 block text-sm text-slate-600">Питомцу плохо прямо сейчас — найдём работающую клинику.</span></button>
<button onclick="go('guest','telemed')" class="tap w-full rounded-[24px] border border-violet-200 bg-violet-50 p-4 text-left"><div class="flex justify-between gap-3"><span><b>💬 Ветеринар онлайн</b><span class="mt-1 block text-sm text-slate-600">Разобрать симптомы, анализы или получить второе мнение.</span></span><strong class="whitespace-nowrap text-primary">790 ₽</strong></div><small class="mt-2 block font-bold text-violet-700">Подключение: 8–12 минут</small></button>
<button onclick="go('guest','check')" class="tap w-full rounded-[24px] border border-line bg-white p-4 text-left shadow-card"><b>♡ Проверить ситуацию</b><span class="mt-1 block text-sm text-slate-500">Три простых вопроса без медицинских терминов.</span></button>
<button onclick="go('guest','insurance')" class="tap w-full rounded-[24px] border border-amber-200 bg-amber-50 p-4 text-left"><b>🛡 Страховка питомца</b><span class="mt-1 block text-sm text-slate-600">Подобрать полис или проверить покрытие до визита.</span></button></section>`}
function check(){return `${title('Проверим ситуацию','Расскажите о питомце','Это займёт меньше минуты.')}
<section class="space-y-4 px-4 pt-5"><label class="block text-sm font-bold">Кто ваш питомец?<select class="mt-2 w-full rounded-2xl border border-line p-3"><option>Кот</option><option>Собака</option><option>Другое животное</option></select></label><label class="block text-sm font-bold">Что беспокоит?<textarea class="mt-2 min-h-24 w-full rounded-2xl border border-line p-3">Питомец стал вялым и хуже ест.</textarea></label>${btn('Показать подходящие варианты',"go('guest','list')",'primary')}</section>`}
function mapPage(emergency=false){setTimeout(initMap,0);return `${title(emergency?'Срочно':'Подбор клиники',emergency?'Нужен очный осмотр сейчас':'Клиники рядом','Адреса на карте — реальные. Свободные слоты в демо — тестовые.')}
<section class="px-4 pt-5"><div id="map"></div><div class="mt-4 space-y-3">${clinics.map((c,i)=>`<button onclick="S.clinic='${c.name}';go('guest','clinic')" class="tap w-full rounded-[22px] border border-line bg-white p-4 text-left shadow-card"><b>${c.name}</b><span class="float-right text-amber-600">★ ${c.rate}</span><small class="mt-1 block text-slate-500">${c.addr}</small><small class="mt-2 inline-block rounded-full ${emergency?'bg-rose-50 text-rose-700':'bg-mint text-primary'} px-2 py-1 font-bold">${emergency&&i===2?'Примет срочно':'Ответ за '+(6+i*3)+' минут'}</small></button>`).join('')}</div></section>`}
function clinic(){let c=clinics.find(x=>x.name===S.clinic)||clinics[0];return `${title('Запись в клинику',c.name,c.addr)}<section class="px-4 pt-5">${card(`<b>Выберите время</b><div class="mt-3 grid gap-2">${c.slots.map(x=>`<button onclick="S.slot='${x}';render()" class="tap flex items-center justify-between rounded-2xl border ${S.slot===x?'border-primary bg-mint text-primary':'border-line bg-white'} px-4 py-3 text-left text-sm font-bold"><span>${x}</span>${S.slot===x?'✓':''}</button>`).join('')}</div>`)}<div class="mt-4 grid grid-cols-2 gap-3">${btn('Маршрут',"toast('Откроем маршрут в Яндекс Картах')",'secondary')}${btn('Продолжить',"go('guest','booking')",'primary')}</div></section>`}
function booking(){return `${title('Почти готово','Куда прислать подтверждение?','Номер нужен только для записи и доступа к личному кабинету.')}<section class="space-y-4 px-4 pt-5">${card(`<b>${S.clinic}</b><p class="mt-1 text-sm text-slate-500">${S.slot}</p>`)}<input class="w-full rounded-2xl border border-line p-3" placeholder="+7 900 000-00-00"><div class="grid grid-cols-2 gap-2">${['MAX','VK','Telegram','WhatsApp'].map(x=>`<button onclick="toast('Уведомления: ${x}')" class="rounded-2xl border border-line bg-white p-3 text-sm font-bold">${x}</button>`).join('')}</div>${btn('Подтвердить и создать кабинет',"go('owner','home')",'primary')}</section>`}
function telemed(){return `${title('Телемедицина','Ветеринар онлайн','Быстрая консультация в защищённом окне сайта VetHelp.')}<section class="space-y-4 px-4 pt-5">${card(`<div class="flex justify-between"><span><b>Консультация ветеринара</b><p class="mt-1 text-sm text-slate-500">Чат, фото, видео и рекомендации по следующему шагу.</p></span><strong class="text-lg text-primary">790 ₽</strong></div><p class="mt-3 rounded-xl bg-violet-50 p-3 text-xs text-violet-800">Ориентировочное подключение: 8–12 минут. При резком ухудшении состояния выбирайте очный срочный маршрут.</p>`)}<textarea class="min-h-28 w-full rounded-2xl border border-line p-3" placeholder="Опишите вопрос врачу"></textarea>${btn('Оплатить и начать консультацию',"toast('Демо: открыт защищённый чат ветеринара')",'primary','')}</section>`}
function insurance(){return `${title('Страховка','Защита для питомца','Проверка покрытия перед визитом и подбор полиса.')}<section class="space-y-3 px-4 pt-5">${card(`<b>Уже есть полис?</b><p class="mt-1 text-sm text-slate-500">Проверим, покрывает ли он текущий случай до обращения в клинику.</p><div class="mt-3">${btn('Проверить покрытие',"toast('Демо: запрос проверки полиса создан')",'secondary')}</div>`)}${card(`<b>Подобрать страховку</b><p class="mt-1 text-sm text-slate-500">Сравнение условий, лимитов и исключений партнёров.</p><div class="mt-3">${btn('Посмотреть варианты',"toast('Демо: варианты страхования появятся после интеграции')",'primary')}</div>`)}<p class="px-1 text-xs leading-5 text-slate-500">В прототипе нет реальных офферов, цен или страхового покрытия.</p></section>`}
function owner(){return `${title('Добрый день, Евгений','Как Барсик сегодня?','Записи, консультации и страховка в одном месте.')}<section class="space-y-4 px-4 pt-5"><div class="rounded-[26px] bg-primary p-5 text-white shadow-card"><small class="font-bold text-white/70">Ближайшая запись</small><h2 class="mt-1 text-2xl font-extrabold">${S.slot}</h2><p class="mt-1 text-sm text-white/80">${S.clinic} · ожидает подтверждения клиникой</p></div><div class="grid grid-cols-2 gap-3"><button onclick="go('guest','telemed')" class="tap rounded-[22px] border border-line bg-white p-4 text-left shadow-card"><b>💬 Ветеринар онлайн</b><small class="mt-2 block text-slate-500">790 ₽ · 8–12 минут</small></button><button onclick="go('guest','insurance')" class="tap rounded-[22px] border border-line bg-white p-4 text-left shadow-card"><b>🛡 Страховка</b><small class="mt-2 block text-slate-500">Полис и покрытие</small></button></div>${card(`<b>🐈 Барсик</b><p class="mt-1 text-sm text-slate-500">Кот · 4 года · история визитов и назначения.</p>`)}</section>`}
function clinicDash(){return `${title('ВетПлюс · Раменское','Рабочий день клиники','Подтверждайте обращения быстро — это снижает потерю записей.')}<section class="space-y-4 px-4 pt-5"><div class="grid grid-cols-3 gap-2"><div class="rounded-2xl bg-primary p-3 text-white"><b class="text-xl">2</b><small class="mt-1 block text-white/70">новые заявки</small></div><div class="rounded-2xl border border-line bg-white p-3"><b class="text-xl">6 мин</b><small class="mt-1 block text-slate-500">первый ответ</small></div><div class="rounded-2xl border border-line bg-white p-3"><b class="text-xl">87%</b><small class="mt-1 block text-slate-500">в SLA</small></div></div>${card(`<div class="flex justify-between"><div><b>Барсик · кот, 4 года</b><p class="mt-1 text-sm text-slate-500">Вялость, плохо ест. Клиент просит ${S.slot}.</p><small class="mt-2 block font-bold text-rose-600">Ответить в течение 12 минут</small></div><span>🐈</span></div><div class="mt-3 grid grid-cols-2 gap-2">${btn('Предложить время',"S.slot='Сегодня, 19:20';toast('Предложение 19:20 отправлено владельцу');render()",'secondary')}${btn('Подтвердить '+S.slot, "S.request='Подтверждено';toast('Запись подтверждена, владелец уведомлён');render()",'primary')}</div>`)}${availability()}</section>`}
function availability(){let a=['14:30 — занято','16:00 — удержано','18:30 — свободно','20:00 — свободно'];return card(`<b>Доступность для новых обращений</b><p class="mt-1 text-sm text-slate-500">Нажмите на свободное окно, чтобы открыть или скрыть его.</p><div class="mt-3 grid grid-cols-2 gap-2">${a.map((x,i)=>`<button onclick="${i>1?`this.classList.toggle('bg-mint');toast('Доступность изменена')`:''}" class="rounded-xl border ${i>1?'border-primary bg-mint text-primary':'border-line bg-slate-100 text-slate-500'} p-3 text-left text-sm font-bold">${x}</button>`).join('')}</div><button onclick="toast('Демо: откроем полное расписание')" class="mt-3 text-sm font-bold text-primary">Открыть полное расписание →</button>`,'')}
function initMap(){if(!window.L||document.querySelector('.leaflet-container'))return;let m=L.map('map').setView([55.5715,38.2276],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);clinics.forEach(c=>L.marker([c.lat,c.lng]).addTo(m).bindPopup(`<b>${c.name}</b><br>${c.addr}<br><button onclick=\"S.clinic='${c.name}';go('guest','clinic')\">Записаться</button>`))}
function render(){let C=document.getElementById('content'),p=S.page,r=S.role;document.getElementById('caption').textContent=r==='guest'?'Новый пользователь':r==='owner'?'Личный кабинет владельца':'Кабинет клиники';document.querySelectorAll('.role').forEach(x=>{let on=x.dataset.role===r;x.className='role tap rounded-full px-3 py-2 text-xs font-bold '+(on?'bg-primary text-white':'border border-line bg-white')});let h=r==='owner'?owner():r==='clinic'?clinicDash():p==='home'?guestHome():p==='check'?check():p==='emergency'?mapPage(true):p==='list'?mapPage(false):p==='clinic'?clinic():p==='booking'?booking():p==='telemed'?telemed():insurance();C.innerHTML=h;document.getElementById('nav').innerHTML=r==='clinic'?`<button onclick="go('clinic','home')" class="py-2 text-xs font-bold text-primary">Главная</button><button onclick="toast('Заявки: 2 новых')" class="py-2 text-xs font-bold">Заявки</button><button onclick="toast('Расписание открыто в демо')" class="py-2 text-xs font-bold">Расписание</button>`:r==='owner'?`<button onclick="go('owner','home')" class="py-2 text-xs font-bold text-primary">Главная</button><button onclick="go('guest','list')" class="py-2 text-xs font-bold">Записаться</button><button onclick="go('guest','insurance')" class="py-2 text-xs font-bold">Страховка</button>`:`<button onclick="go('guest','home')" class="py-2 text-xs font-bold text-primary">Главная</button><button onclick="go('guest','list')" class="py-2 text-xs font-bold">Клиники</button><button onclick="go('guest','telemed')" class="py-2 text-xs font-bold">Онлайн</button>`}
render();
</script>
</body></html>
