apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vethelp-backend-restricted
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vethelp-backend
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Keep this label pair aligned with the installed ingress-nginx chart.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # CoreDNS. Both UDP and TCP are needed because DNS can fall back to TCP.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL deployed in the same Alpha namespace. Change the labels and
    # namespace selector if managed PostgreSQL is used instead.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vethelp-alpha
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # RFC 5737 documentation CIDRs: replace with provider-approved fixed test
    # egress ranges before deploy. Do not replace them with 0.0.0.0/0.
    - to:
        - ipBlock:
            cidr: 203.0.113.0/24
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 198.51.100.0/24
      ports:
        - protocol: TCP
          port: 443
