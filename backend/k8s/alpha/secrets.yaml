apiVersion: v1
kind: ConfigMap
metadata:
  name: vethelp-backend-config
  namespace: vethelp-alpha
  labels:
    app.kubernetes.io/name: vethelp-backend
    app.kubernetes.io/part-of: vethelp
    app.kubernetes.io/environment: alpha
data:
  NODE_ENV: production
  PORT: "3000"
  SWAGGER_ENABLED: "false"
  WORKERS_ENABLED: "true"
  HOLD_TTL_MINUTES: "10"
  OUTBOX_POLL_INTERVAL_MS: "3000"
  OUTBOX_BATCH_SIZE: "20"
  JWT_ISSUER: vethelp-alpha
  JWT_AUDIENCE: vethelp-owner-app
  MIS_VET_MANAGER_BASE_URL: https://mis-alpha.example.internal
  ACQUIRING_API_BASE_URL: https://acquiring-alpha.example.internal
  LIVEKIT_API_URL: wss://livekit-alpha.example.internal
  ALERT_FORWARDER_ENABLED: "true"
  ALERT_FORWARDER_CHANNEL: telegram
  ALERT_FORWARDER_TIMEOUT_MS: "2500"
---
# External Secrets Operator materializes the actual Kubernetes Secret
# `vethelp-backend-secret`. Credentials must be created only in the approved
# cluster secret manager; no plaintext or encoded credential belongs in Git.
#
# Prerequisite: ClusterSecretStore/vethelp-platform-secrets is configured by
# platform operations for Vault, AWS Secrets Manager, Yandex Lockbox, or an
# equivalent approved provider.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vethelp-backend-secret
  namespace: vethelp-alpha
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vethelp-platform-secrets
  target:
    name: vethelp-backend-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef: { key: vethelp-alpha-backend, property: DATABASE_URL }
    - secretKey: JWT_SECRET
      remoteRef: { key: vethelp-alpha-backend, property: JWT_SECRET }
    - secretKey: WORKER_SERVICE_TOKEN
      remoteRef: { key: vethelp-alpha-backend, property: WORKER_SERVICE_TOKEN }
    - secretKey: MIS_VET_MANAGER_API_KEY
      remoteRef: { key: vethelp-alpha-backend, property: MIS_VET_MANAGER_API_KEY }
    - secretKey: ACQUIRING_API_KEY
      remoteRef: { key: vethelp-alpha-backend, property: ACQUIRING_API_KEY }
    - secretKey: ACQUIRING_WEBHOOK_SECRET
      remoteRef: { key: vethelp-alpha-backend, property: ACQUIRING_WEBHOOK_SECRET }
    - secretKey: LIVEKIT_API_KEY
      remoteRef: { key: vethelp-alpha-backend, property: LIVEKIT_API_KEY }
    - secretKey: LIVEKIT_API_SECRET
      remoteRef: { key: vethelp-alpha-backend, property: LIVEKIT_API_SECRET }
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef: { key: vethelp-alpha-alerts, property: TELEGRAM_BOT_TOKEN }
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef: { key: vethelp-alpha-alerts, property: TELEGRAM_CHAT_ID }
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef: { key: vethelp-alpha-alerts, property: SLACK_WEBHOOK_URL }
