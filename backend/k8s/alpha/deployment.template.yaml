apiVersion: apps/v1
kind: Deployment
metadata:
  name: vethelp-backend
  namespace: vethelp-alpha
  labels:
    app.kubernetes.io/name: vethelp-backend
    app.kubernetes.io/part-of: vethelp
    app.kubernetes.io/component: backend
    app.kubernetes.io/environment: alpha
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vethelp-backend
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vethelp-backend
        app.kubernetes.io/part-of: vethelp
        app.kubernetes.io/component: backend
        app.kubernetes.io/environment: alpha
    spec:
      serviceAccountName: vethelp-backend
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vethelp-backend
          image: __VETHELP_BACKEND_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: vethelp-backend-config
            - secretRef:
                name: vethelp-backend-secret
          startupProbe:
            httpGet: { path: /v1/health, port: http }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /v1/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: vethelp-backend
  namespace: vethelp-alpha
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vethelp-backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vethelp-backend
  namespace: vethelp-alpha
automountServiceAccountToken: false
