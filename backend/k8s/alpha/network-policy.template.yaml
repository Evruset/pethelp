apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vethelp-backend-default-deny
  namespace: vethelp-alpha
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vethelp-backend
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vethelp-backend-allow-ingress-and-approved-egress
  namespace: vethelp-alpha
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vethelp-backend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: __ACQUIRING_WEBHOOK_CIDR__
      ports:
        - protocol: TCP
          port: 443
