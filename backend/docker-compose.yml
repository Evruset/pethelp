services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vethelp
      POSTGRES_USER: vethelp
      POSTGRES_PASSWORD: vethelp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vethelp -d vethelp"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://vethelp:vethelp@postgres:5432/vethelp
      WORKERS_ENABLED: "true"
      DEV_WORKER_KEY: change-me-before-public-use
    ports:
      - "3000:3000"
    command: sh -c "node dist/scripts/migrate.js && node dist/src/main.js"

volumes:
  postgres_data:
