services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vethelp
      POSTGRES_USER: vethelp
      POSTGRES_PASSWORD: vethelp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vethelp -d vethelp"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://vethelp:vethelp@postgres:5432/vethelp
    command: npm run migrate:up

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      DATABASE_URL: postgres://vethelp:vethelp@postgres:5432/vethelp
      WORKERS_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:-vethelp-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-vethelp-api}
      WORKER_SERVICE_TOKEN: ${WORKER_SERVICE_TOKEN:?WORKER_SERVICE_TOKEN is required}
    ports:
      - "3000:3000"
    command: node dist/src/main.js

volumes:
  postgres_data:
