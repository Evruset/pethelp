name: V50 Owner Web Diagnostics

on:
  pull_request:
    branches:
      - agent/v51-stage-01-architecture

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/owner_mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos > "$RUNNER_TEMP/v50-owner-analyze.txt" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - id: tests
        shell: bash
        run: |
          set +e
          flutter test > "$RUNNER_TEMP/v50-owner-tests.txt" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish test tail
        uses: actions/github-script@v7
        env:
          ANALYZE_STATUS: ${{ steps.analyze.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        with:
          script: |
            const fs = require('fs');
            const tests = fs.readFileSync(process.env.RUNNER_TEMP + '/v50-owner-tests.txt', 'utf8');
            const clipped = tests.length > 10000 ? tests.slice(-10000) : tests;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Temporary V50 Owner Web failing-test tail\n\nAnalyze exit: \`${process.env.ANALYZE_STATUS}\`\nTest exit: \`${process.env.TEST_STATUS}\`\n\n\`\`\`text\n${clipped}\n\`\`\``
            });
      - name: Enforce validation result
        if: steps.analyze.outputs.status != '0' || steps.tests.outputs.status != '0'
        run: exit 1
