name: V50 Owner Web Diagnostics

on:
  pull_request:
    branches:
      - agent/v51-stage-01-architecture

permissions:
  contents: read

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/owner_mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build V50 Owner Web
        run: >-
          flutter build web
          -t lib/owner_journey_main.dart
          --dart-define=OWNER_V50_WEB_SHELL=true
          --dart-define=VETHELP_API_BASE_URL=http://127.0.0.1:3000
