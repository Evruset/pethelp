name: Owner Mobile

on:
  pull_request:
    paths:
      - 'apps/owner_mobile/**'
      - '.github/workflows/owner-mobile.yml'
  push:
    branches: [main]
    paths:
      - 'apps/owner_mobile/**'
      - '.github/workflows/owner-mobile.yml'
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/owner_mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
