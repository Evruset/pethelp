name: Local Stack Cross-Channel E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  local-stack-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm
          cache-dependency-path: apps/clinic-portal/package.json

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Clinic Portal dependencies
        working-directory: apps/clinic-portal
        run: npm install

      - name: Install Linux lightningcss native binding
        working-directory: apps/clinic-portal
        shell: bash
        run: |
          version="$(node -p "require('./node_modules/lightningcss/package.json').version")"
          npm install --no-save --package-lock=false "lightningcss-linux-x64-gnu@${version}"

      - name: Install Chromium runtime dependencies
        working-directory: apps/clinic-portal
        run: npx playwright install --with-deps chromium

      - name: Validate local-stack runner syntax
        run: |
          node --check dev/local/local-stack-e2e.mjs
          node --check dev/local/create-clinic-token.mjs
          docker compose -f docker-compose.local.yml config --quiet

      - name: Start and seed local stack
        shell: bash
        run: |
          make local-up
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/v1/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo 'Backend did not become healthy' >&2
              exit 1
            fi
            sleep 2
          done
          make local-seed

      - name: Run real local-stack cross-channel E2E
        env:
          FLUTTER_BIN: flutter
        run: make local-stack-e2e

      - name: Upload local-stack E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-stack-e2e-evidence
          path: .dev-local/local-stack-e2e
          if-no-files-found: ignore
          retention-days: 14

      - name: Print local stack logs on failure
        if: failure()
        run: docker compose -p vethelp-alpha -f docker-compose.local.yml logs --no-color --tail 500

      - name: Stop local stack
        if: always()
        run: docker compose -p vethelp-alpha -f docker-compose.local.yml down
