name: Telemed Owner Flow

on:
  pull_request:
    paths:
      - 'backend/src/modules/telemed/**'
      - 'backend/test/telemed-owner.integration-spec.ts'
      - 'backend/migrations/node-pg/1719141000000_telemed_owner_controls.js'
      - 'apps/owner_mobile/features/telemed/**'
      - 'apps/owner_mobile/lib/features/telemed/**'
      - '.github/workflows/telemed-owner.yml'
  workflow_dispatch:

jobs:
  backend-owner-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vethelp
          POSTGRES_USER: vethelp
          POSTGRES_PASSWORD: vethelp
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vethelp -d vethelp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://vethelp:vethelp@localhost:5432/vethelp
      JWT_SECRET: telemed-owner-test-secret-at-least-32-bytes
      JWT_ISSUER: vethelp-ci-auth
      JWT_AUDIENCE: vethelp-ci-api
      WORKER_SERVICE_TOKEN: telemed-owner-worker-token
      LIVEKIT_API_URL: wss://livekit.ci.test
      LIVEKIT_API_KEY: telemed-owner-key
      LIVEKIT_API_SECRET: telemed-owner-secret
      WORKERS_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build
      - run: npm run migrate:up
      - run: npm test -- test/telemed-owner.integration-spec.ts

  mobile-static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/owner_mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
