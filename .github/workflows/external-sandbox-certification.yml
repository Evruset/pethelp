name: External Sandbox Certification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify:
    if: vars.VETHELP_SANDBOX_CERT_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: external-sandbox
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: sandbox-cert
      SANDBOX_CERT_ENABLED: 'true'
      SANDBOX_FIXTURES_ENABLED: 'true'
      SANDBOX_ENVIRONMENT_ID: ${{ vars.SANDBOX_ENVIRONMENT_ID }}
      SANDBOX_ALLOWED_HOSTS: ${{ vars.SANDBOX_ALLOWED_HOSTS }}
      SANDBOX_VETHELP_URL: ${{ vars.SANDBOX_VETHELP_URL }}
      SANDBOX_MIS_URL: ${{ vars.SANDBOX_MIS_URL }}
      SANDBOX_ACQUIRING_URL: ${{ vars.SANDBOX_ACQUIRING_URL }}
      SANDBOX_CERTIFICATION_TOKEN: ${{ secrets.SANDBOX_CERTIFICATION_TOKEN }}
      SANDBOX_OWNER_JWT: ${{ secrets.SANDBOX_OWNER_JWT }}
      SANDBOX_MIS_AUTH_TOKEN: ${{ secrets.SANDBOX_MIS_AUTH_TOKEN }}
      SANDBOX_ACQUIRING_SIGN_SECRET: ${{ secrets.SANDBOX_ACQUIRING_SIGN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run real provider certification and generate evidence report
        run: npm run cert:sandbox
      - name: Upload immutable certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-certification-evidence
          path: |
            backend/artifacts/SANDBOX_CERTIFICATION_REPORT.md
            backend/artifacts/sandbox-certification/evidence.json
            backend/artifacts/sandbox-certification/jest-results.json
          if-no-files-found: warn
