name: Backend CI and Immutable Release

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'infrastructure/k8s/**'
      - 'scripts/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infrastructure/k8s/**'
      - 'scripts/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify-manifests:
    name: Immutable manifest policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on mutable Kubernetes image references
        run: sh scripts/verify-manifests.sh infrastructure/k8s

  build-push-render:
    name: Build, push and render immutable artifact
    needs: verify-manifests
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.digest.outputs.image_digest }}
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/pethelp-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable candidate image
        run: |
          IMAGE_NAME="${IMAGE_REPOSITORY}:sha-${GITHUB_SHA}"
          docker build --pull --file backend/Dockerfile --tag "$IMAGE_NAME" backend
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
      - name: Push image and resolve immutable digest
        id: digest
        run: |
          docker push "$IMAGE_NAME"
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME)
          test -n "$IMAGE_DIGEST"
          case "$IMAGE_DIGEST" in
            *@sha256:????????????????????????????????????????????????????????????????) ;;
            *) echo "Pushed image did not resolve to a SHA-256 RepoDigest: $IMAGE_DIGEST" >&2; exit 1 ;;
          esac
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_ENV"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.5.0
      - name: Render deployment with pushed image digest
        run: |
          chmod +x scripts/render-kustomize-release.sh scripts/verify-manifests.sh
          IMAGE_DIGEST="$IMAGE_DIGEST" scripts/render-kustomize-release.sh artifacts/release
      - name: Upload immutable release manifest
        uses: actions/upload-artifact@v4
        with:
          name: vethelp-alpha-immutable-manifest
          path: artifacts/release/vethelp-alpha.yaml
          if-no-files-found: error

  deploy-alpha:
    name: Deploy rendered immutable manifest to Alpha
    needs: build-push-render
    if: github.ref == 'refs/heads/main' && vars.VETHELP_ALPHA_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: alpha
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vethelp-alpha-immutable-manifest
          path: artifacts/release
      - uses: azure/setup-kubectl@v4
      - name: Configure Kubernetes client
        env:
          KUBECONFIG_DATA: ${{ secrets.VETHELP_ALPHA_KUBECONFIG }}
        run: |
          test -n "$KUBECONFIG_DATA"
          echo "$KUBECONFIG_DATA" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
      - name: Apply only digest-pinned rendered manifest
        run: |
          grep -Eq 'image: .+@sha256:[0-9a-f]{64}$' artifacts/release/vethelp-alpha.yaml
          kubectl apply -f artifacts/release/vethelp-alpha.yaml
          kubectl -n vethelp-alpha rollout status deployment/vethelp-backend --timeout=180s

  sandbox-certification:
    name: External sandbox certification
    needs: build-push-render
    if: github.ref == 'refs/heads/main' && vars.VETHELP_SANDBOX_CERT_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: external-sandbox
    defaults:
      run:
        working-directory: backend
    env:
      SANDBOX_CERT_ENABLED: 'true'
      SANDBOX_VETHELP_API_URL: ${{ vars.SANDBOX_VETHELP_API_URL }}
      SANDBOX_MIS_API_URL: ${{ vars.SANDBOX_MIS_API_URL }}
      SANDBOX_ACQUIRING_API_URL: ${{ vars.SANDBOX_ACQUIRING_API_URL }}
      SANDBOX_CERTIFICATION_TOKEN: ${{ secrets.SANDBOX_CERTIFICATION_TOKEN }}
      SANDBOX_OWNER_JWT: ${{ secrets.SANDBOX_OWNER_JWT }}
      SANDBOX_CLINIC_JWT: ${{ secrets.SANDBOX_CLINIC_JWT }}
      SANDBOX_PLATFORM_ADMIN_JWT: ${{ secrets.SANDBOX_PLATFORM_ADMIN_JWT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run external certification suite
        run: npm test -- test/sandbox-cert.spec.ts
      - name: Upload sandbox certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-certification-evidence
          path: backend/artifacts/certification/SANDBOX_CERTIFICATION_REPORT.md
          if-no-files-found: warn
