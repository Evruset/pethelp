name: Clinic Portal

on:
  pull_request:
    paths:
      - 'apps/clinic-portal/**'
      - '.github/workflows/clinic-portal.yml'
  push:
    branches: [main]
    paths:
      - 'apps/clinic-portal/**'
      - '.github/workflows/clinic-portal.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/clinic-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/clinic-portal/package.json
      - run: npm install
      - run: npm run build
