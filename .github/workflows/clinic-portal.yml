name: Clinic Portal

on:
  pull_request:
    paths:
      - 'apps/clinic-portal/**'
      - '.github/workflows/clinic-portal.yml'
  push:
    branches: [main]
    paths:
      - 'apps/clinic-portal/**'
      - '.github/workflows/clinic-portal.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/clinic-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/clinic-portal/package.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm install
      - run: npm run typecheck
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Generate Allure report
        if: always()
        run: npm run allure:generate
      - name: Upload UI-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clinic-portal-ui-evidence
          path: |
            apps/clinic-portal/allure-report
            apps/clinic-portal/allure-results
            apps/clinic-portal/playwright-report
            apps/clinic-portal/test-results
          if-no-files-found: ignore
